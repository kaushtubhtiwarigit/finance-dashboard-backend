version: '3.8'

services:
  app:
    build: .
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/finance-dashboard
      JWT_SECRET: finance-dashboard-super-secret-key-2026
      JWT_EXPIRES_IN: 100d
      BCRYPT_ROUNDS: 10
    depends_on:
      - mongo
    restart: on-failure

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
